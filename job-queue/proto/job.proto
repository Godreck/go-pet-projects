syntax = "proto3";

package jobqueue.v1;

option go_package = "github.com/Godreck/go-pet-projects/job-queue/proto/jobqueuev1;jobqueuev1";

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_QUEUED = 1;
  JOB_STATUS_PROCESSING = 2;
  JOB_STATUS_DONE = 3;
  JOB_STATUS_FAILED = 4;
}

message Job {
  string id = 1;
  string payload = 2;
  JobStatus status = 3;
  string error = 4;
  string created_at = 5;
  string updated_at = 6;
}

message SubmitJobRequest {
  string payload = 1;
}

message SubmitJobResponse {
  Job job = 1;
}

message GetJobRequest {
  string id = 1;
}

message GetJobResponse {
  Job job = 1;
}

service JobQueueService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
}
